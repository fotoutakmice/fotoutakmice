<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto Utakmice</title>

<style>
body { margin:0; font-family:Arial; background:#fff; color:#111; }

header {
    text-align:center;
    padding:30px 20px;
    border-bottom:1px solid #eee;
}

.logo img {
    height:250px;
    margin-bottom:10px;
}

.subtitle { font-size:16px; color:#555; }
.contact { margin-top:8px; font-weight:bold; }

.filters {
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
}

.filters {
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
    display:flex;
    justify-content:center;
}

.filters input {
    padding:10px;
    font-size:14px;
    width:33%;
    min-width:220px;
    max-width:400px;
}

.container {
    max-width:1200px;
    margin:20px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:30px;
}

.album-card {
    border:1px solid #eee;
    border-radius:8px;
    overflow:hidden;
    background:#fff;
}

.thumb-slider {
    position:relative;
    overflow:hidden;
}

.thumb-track {
    display:flex;
    transition:transform 0.4s ease;
}

.thumb-track img {
    width:100%;
    height:auto;
    flex-shrink:0;
    object-fit:contain;
    cursor:pointer;
    border-radius:8px;
}

.arrow {
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.6);
    color:#fff;
    width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:18px;
}

.arrow.left { left:10px; }
.arrow.right { right:10px; }

.album-info {
    padding:15px;
    font-weight:bold;
}

.new-badge {
    background:red;
    color:#fff;
    font-size:12px;
    padding:3px 8px;
    margin-left:10px;
    border-radius:4px;
}

footer {
    text-align:center;
    padding:40px 20px;
    border-top:1px solid #eee;
    font-size:14px;
}

@media (max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
</style>
</head>
<body>

<header>
    <div class="logo">
        <img src="/logo.png">
    </div>
    <div class="subtitle">Profesionalno fotografisanje sportskih događaja</div>
    <div class="contact">📞 +381 64 315 9910</div>
</header>

<div class="filters">
    <input type="text" id="search" placeholder="Pretraga kluba...">
</div>

<div class="container" id="albums"></div>

<footer>
© 2026 Foto Utakmice
</footer>

<script>

function normalizeText(s){
    return (s || "")
        .toLowerCase()
        .replace(/š/g,"s")
        .replace(/đ/g,"dj")
        .replace(/č/g,"c")
        .replace(/ć/g,"c")
        .replace(/ž/g,"z")
        .replace(/љ/g,"lj")
        .replace(/њ/g,"nj")
        .replace(/џ/g,"dz")
        .replace(/[^a-z0-9]/g,"");
}

let allAlbums = [];

fetch("/api/albums")
.then(r=>r.json())
.then(albums=>{
    allAlbums = albums;
    render(albums);
});

document.getElementById("search").addEventListener("input", applyFilters);

function applyFilters(){

    const searchVal = normalizeText(document.getElementById("search").value);

    const filtered = allAlbums.filter(a => {

        const combinedText = normalizeText(
            a.club1 + " " +
            a.club2 + " " +
            a.date
        );

        return searchVal === "" || combinedText.includes(searchVal);
    });

    render(filtered);
}

function render(albums){
    const container = document.getElementById("albums");
    container.innerHTML="";

    albums.forEach((album,i)=>{

        const title = `${album.date} ${album.club1} – ${album.club2} (${[album.category, album.extra].filter(Boolean).join(" ")})`;

        const card = document.createElement("div");
        card.className="album-card";

        let imagesHTML = "";
        if(album.thumbnails.length){
            album.thumbnails.forEach(t=>{
                imagesHTML += `<img src="${t}" onclick="openAlbum('${album.name}')">`;
            });
        } else {
            imagesHTML = `<div style="padding:40px;text-align:center;">Nema thumbnaila</div>`;
        }

        card.innerHTML=`
            <div class="thumb-slider">
                <div class="thumb-track" id="track-${i}">
                    ${imagesHTML}
                </div>
                ${album.thumbnails.length>1?`
                <div class="arrow left" onclick="slide(${i},-1)">‹</div>
                <div class="arrow right" onclick="slide(${i},1)">›</div>
                `:""}
            </div>
            <div class="album-info">
                ${title.toUpperCase()}
                ${i<8?'<span class="new-badge">NOVO</span>':''}
            </div>
        `;
        container.appendChild(card);
    });
}

function slide(i,dir){
    const track = document.getElementById(`track-${i}`);
    const width = track.clientWidth;
    const current = track.style.transform.match(/-?\d+/);
    let offset = current?parseInt(current[0]):0;
    offset += dir*width;
    if(offset>0) offset=0;
    if(offset<-width*(track.children.length-1)) offset=-width*(track.children.length-1);
    track.style.transform=`translateX(${offset}px)`;
}

function openAlbum(name){
    window.location=`/album.html?name=${name}`;
}

</script>

</body>
</html>
