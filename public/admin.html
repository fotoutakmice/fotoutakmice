<!doctype html>
<html lang="sr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Admin Upload</title>
</head>

<body style="font-family: sans-serif; max-width: 720px; margin: 40px auto; padding: 0 12px;">

<h1>Admin upload (folder)</h1>

<p>
<label><b>Izaberi folder sa slikama:</b></label><br/>
<input id="file"
       type="file"
       accept="image/*"
       webkitdirectory
       directory
       multiple />
</p>

<p>
<button id="btn"
        style="padding: 10px 14px; font-size: 16px;">
Upload
</button>

<button id="deleteBtn"
        style="padding: 10px 14px; font-size: 16px; margin-left:10px; background:#c0392b; color:white;">
Obriši ceo album
</button>
</p>

<pre id="out"
     style="background:#f5f5f5; padding: 12px; white-space: pre-wrap;"></pre>

<script>
const out = document.getElementById("out");

// ================= UPLOAD =================
document.getElementById("btn").addEventListener("click", async () => {

  const fileInput = document.getElementById("file");
  const files = fileInput.files;

  if (!files.length) {
    out.textContent = "Izaberi folder sa slikama.";
    return;
  }

  const pass = prompt("Unesi ADMIN_PASSWORD:");
  if (!pass) {
    out.textContent = "Otkazano.";
    return;
  }

  const firstPath = files[0].webkitRelativePath;
  const album = firstPath.split("/")[0];

  out.textContent = "Album: " + album + "\n\nUpload u toku...\n";

  const CONCURRENCY = 5;
  let completed = 0;

  async function uploadFile(file) {
    const fd = new FormData();
    fd.append("album", album);

    const cleanFile = new File([file], file.name, { type: file.type });
    fd.append("file", cleanFile);

    const resp = await fetch("/api/admin/upload", {
      method: "POST",
      headers: { "x-admin-password": pass },
      body: fd
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error("Greška kod fajla: " + file.name + "\n" + err);
    }

    completed++;
    out.textContent =
      "Album: " + album + "\n" +
      "Upload " + completed + " / " + files.length;
  }

  try {
    for (let i = 0; i < files.length; i += CONCURRENCY) {
      const chunk = Array.from(files).slice(i, i + CONCURRENCY);
      await Promise.all(chunk.map(uploadFile));
    }

    out.textContent =
      "✅ Ceo folder je uploadovan.\n\nAlbum: " + album +
      "\n\nOsveži stranicu sajta.";

  } catch (err) {
    out.textContent = err.message;
  }

});

// ================= DELETE =================
document.getElementById("deleteBtn").addEventListener("click", async () => {

  const fileInput = document.getElementById("file");
  const files = fileInput.files;

  if (!files.length) {
    out.textContent = "Izaberi folder (da bi sistem znao koji album brišeš).";
    return;
  }

  const firstPath = files[0].webkitRelativePath;
  const album = firstPath.split("/")[0];

  const confirmDelete = confirm(
    "Da li si SIGURAN da želiš da obrišeš ceo album?\n\n" + album
  );

  if (!confirmDelete) return;

  const pass = prompt("Unesi ADMIN_PASSWORD:");
  if (!pass) {
    out.textContent = "Otkazano.";
    return;
  }

  out.textContent = "Brisanje u toku...";

  const resp = await fetch("/api/admin/album", {
    method: "DELETE",
    headers: {
      "Content-Type": "application/json",
      "x-admin-password": pass
    },
    body: JSON.stringify({ album })
  });

  const data = await resp.json().catch(() => ({}));

  if (resp.ok) {
    out.textContent =
      "🗑 Album obrisan.\n\n" +
      "Album: " + album + "\n" +
      "Obrisano fajlova: " + data.deleted;
  } else {
    out.textContent =
      "Greška pri brisanju:\n\n" +
      JSON.stringify(data, null, 2);
  }

});
</script>

</body>
</html>
